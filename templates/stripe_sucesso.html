<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assinatura confirmada · ABRIU</title>
<meta name="theme-color" content="#7c3aed">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f1117; color: #e2e8f0;
  min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 1.5rem;
}
.card {
  background: #1a1d27; border: 1px solid #2e3250; border-radius: 20px;
  padding: 2.5rem 2rem; width: 100%; max-width: 420px; text-align: center;
}
.icon { font-size: 3.5rem; margin-bottom: 1rem; }
h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .5rem; color: #f1f5f9; }
p { color: #64748b; font-size: .95rem; line-height: 1.6; margin-bottom: 1.5rem; }
.btn {
  display: inline-block; background: #4f6ef7; color: #fff; border-radius: 10px;
  padding: .85rem 2rem; font-size: 1rem; font-weight: 600; text-decoration: none;
  transition: background .15s;
}
.btn:hover { background: #3b5bdb; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1>Assinatura confirmada!</h1>
  <p>Seu plano foi ativado com sucesso. Bem-vindo ao ABRIU Pro!</p>
  <a href="/configuracoes" class="btn">Ver meu plano</a>
</div>
</body>
</html>
