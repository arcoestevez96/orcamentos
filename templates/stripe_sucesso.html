<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assinatura confirmada — ABRIU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/abriu.css') }}">
<style>
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; overflow: hidden; }
  .bg-decor::before {
    content: ''; position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 600px;
    background: radial-gradient(ellipse at center, oklch(0.78 0.16 150 / 0.18), transparent 65%);
    filter: blur(20px); pointer-events: none;
  }
  .ok-card {
    width: 100%; max-width: 460px;
    background: var(--ink-1);
    border: 1px solid var(--line-strong);
    border-radius: 22px;
    padding: 48px 40px;
    text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    position: relative; z-index: 1;
  }
  .ok-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: oklch(0.78 0.16 150 / 0.14);
    border: 1px solid oklch(0.78 0.16 150 / 0.4);
    color: var(--ok);
    display: grid; place-items: center;
    margin: 0 auto 24px;
    animation: popIn .5s cubic-bezier(.2,.9,.3,1);
  }
  .ok-eyebrow { font-family: var(--ff-mono); font-size: 11px; color: var(--ok); letter-spacing: 0.1em; text-transform: uppercase; }
  .ok-h1 {
    font-size: 30px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.15;
    margin: 12px 0 14px;
  }
  .ok-h1 em { font-style: italic; font-weight: 500; color: var(--ok); }
  .ok-p { font-size: 14.5px; color: var(--fg-dim); line-height: 1.55; margin: 0 0 30px; }
  .ok-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  @keyframes popIn {
    0% { transform: scale(0.5); opacity: 0 }
    60% { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1 }
  }
</style>
</head>
<body class="dark">

<div class="bg-decor"></div>

<div class="ok-card">
  <div class="ok-icon">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 12l5 5L20 6"/>
    </svg>
  </div>
  <div class="ok-eyebrow">↳ Pagamento confirmado</div>
  <h1 class="ok-h1">Bem-vindo ao <em>ABRIU Pro.</em></h1>
  <p class="ok-p">
    Sua assinatura foi ativada. Já pode enviar orçamentos ilimitados e acompanhar a leitura em tempo real.
  </p>
  <div class="ok-actions">
    <a href="/dashboard" class="btn btn-accent btn-md">
      Ir para o painel
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>
    <a href="/configuracoes" class="btn btn-ghost btn-md">Ver meu plano</a>
  </div>
</div>

</body>
</html>
