<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Expirado</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .card {
    background: #1a1d27;
    border: 1px solid #2e3250;
    border-radius: 18px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .icon { font-size: 3.5rem; margin-bottom: 1rem; }
  h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: .5rem; color: #f87171; }
  p  { color: #94a3b8; font-size: .92rem; line-height: 1.6; }
  .nome { color: #e2e8f0; font-weight: 600; }
  .aviso {
    margin-top: 1.5rem;
    background: rgba(239,68,68,.08);
    border: 1px solid rgba(239,68,68,.2);
    border-radius: 10px;
    padding: 1rem;
    font-size: .85rem;
    color: #fca5a5;
    line-height: 1.5;
  }
  .empresa { margin-top: 2rem; font-size: .78rem; color: #475569; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">⏰</div>
  <h1>Link Expirado</h1>
  <p>Olá, <span class="nome">{{ cliente }}</span>!<br><br>
  O link do orçamento <strong>{{ titulo }}</strong> expirou após 48 horas.</p>
  <div class="aviso">
    Entre em contato com <strong>{{ empresa }}</strong> para receber um novo link atualizado.
  </div>
  {% if empresa %}
  <div class="empresa">{{ empresa }}</div>
  {% endif %}
</div>
</body>
</html>
