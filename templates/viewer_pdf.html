<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{{ titulo }}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* Barra do topo */
  .topbar {
    background: #111;
    border-bottom: 1px solid #2a2a2a;
    padding: .7rem 1rem;
    display: flex;
    align-items: center;
    gap: .8rem;
    flex-shrink: 0;
    min-height: 52px;
  }

  .topbar .titulo {
    flex: 1;
    font-size: .9rem;
    font-weight: 600;
    color: #e2e8f0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topbar .empresa {
    font-size: .75rem;
    color: #64748b;
    white-space: nowrap;
  }

  /* Botão fechar */
  .btn-fechar {
    display: flex;
    align-items: center;
    gap: .35rem;
    background: rgba(239,68,68,.12);
    border: 1px solid rgba(239,68,68,.25);
    color: #f87171;
    border-radius: 8px;
    padding: .4rem .8rem;
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    text-decoration: none;
    transition: background .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-fechar:active { background: rgba(239,68,68,.22); }

  /* Botão download */
  .btn-download {
    display: flex;
    align-items: center;
    gap: .3rem;
    background: rgba(79,110,247,.12);
    border: 1px solid rgba(79,110,247,.25);
    color: #818cf8;
    border-radius: 8px;
    padding: .4rem .75rem;
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    text-decoration: none;
    transition: background .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-download:active { background: rgba(79,110,247,.22); }

  /* Área do PDF */
  .pdf-area {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Fallback para iOS que bloqueia iframes de PDF */
  .pdf-fallback {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 1rem;
    color: #94a3b8;
    text-align: center;
    padding: 2rem;
  }
  .pdf-fallback .icon { font-size: 3.5rem; }
  .pdf-fallback h3 { color: #e2e8f0; font-size: 1.1rem; }
  .pdf-fallback p  { font-size: .88rem; line-height: 1.5; }
  .pdf-fallback a  {
    margin-top: .5rem;
    background: #4f6ef7;
    color: #fff;
    padding: .7rem 1.5rem;
    border-radius: 10px;
    font-weight: 600;
    font-size: .9rem;
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="btn-fechar" href="javascript:void(0)" onclick="fechar()">✕ Fechar</a>
  <div>
    <div class="titulo">{{ titulo }}</div>
    {% if empresa %}<div class="empresa">{{ empresa }}</div>{% endif %}
  </div>
  <a class="btn-download" href="/pdf_raw/{{ token }}" download>⬇ Baixar</a>
</div>

<div class="pdf-area">
  <iframe
    id="pdf-frame"
    src="/pdf_raw/{{ token }}"
    type="application/pdf"
    onload="iframeOk()"
    onerror="mostrarFallback()">
  </iframe>

  <div class="pdf-fallback" id="fallback">
    <div class="icon">📄</div>
    <h3>Visualizar PDF</h3>
    <p>Seu navegador não suporta exibição inline de PDFs.<br>Toque no botão abaixo para abrir.</p>
    <a href="/pdf_raw/{{ token }}" target="_blank">📂 Abrir PDF</a>
  </div>
</div>

<script>
function fechar() {
  // Tenta fechar a aba; se não conseguir, volta no histórico
  try { window.close(); } catch(e) {}
  setTimeout(() => {
    if (!window.closed) {
      if (document.referrer) {
        history.back();
      } else {
        window.location.href = '/';
      }
    }
  }, 100);
}

function iframeOk() {
  // iframe carregou — verifica se está vazio (iOS bloqueia PDF em iframe)
  try {
    const frame = document.getElementById('pdf-frame');
    // Se o contentDocument estiver vazio, o iframe não renderizou o PDF
    if (frame.contentDocument && frame.contentDocument.body) {
      const bodyText = frame.contentDocument.body.innerText || '';
      if (bodyText.trim() === '') mostrarFallback();
    }
  } catch(e) {
    // Cross-origin ou bloqueado → mostra fallback
    mostrarFallback();
  }
}

function mostrarFallback() {
  document.getElementById('pdf-frame').style.display = 'none';
  const fb = document.getElementById('fallback');
  fb.style.display = 'flex';
}

// iOS Safari: PDFs em iframe muitas vezes não carregam — detecta após timeout
setTimeout(() => {
  const frame = document.getElementById('pdf-frame');
  if (frame && frame.style.display !== 'none') {
    try {
      // Se não carregou nada em 4s no iOS, mostra fallback
      const ua = navigator.userAgent;
      const isIOS = /iPhone|iPad|iPod/.test(ua);
      if (isIOS) mostrarFallback();
    } catch(e) {}
  }
}, 1000);
</script>

</body>
</html>
